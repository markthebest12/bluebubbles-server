# .uplift.yml
bumps:
  - file: package.json
    json:
      - path: "version"
        semver: true
  - file: packages/server/package.json
    json:
      - path: "version"
        semver: true
  # Note: packages/ui/package.json intentionally excluded — only bump on UI changes

changelog:
  include:
    - feat
    - fix
    - perf
    - refactor
  exclude:
    - "^Merge"
    - "^chore"
  trimHeader: true

git:
  includeArtifacts:
    - package-lock.json

commitAuthor:
  name: uplift-bot
  email: uplift-bot@users.noreply.github.com

annotatedTags: true
