# .uplift.yml
bumps:
  - file: package.json
    regex:
      - pattern: '"version":\s*"(?P<version>.*)"'
        semver: true
        count: 1
  - file: packages/server/package.json
    regex:
      - pattern: '"version":\s*"(?P<version>.*)"'
        semver: true
        count: 1
  # Note: packages/ui/package.json intentionally excluded — only bump on UI changes

changelog:
  include:
    - "feat"
    - "fix"
    - "perf"
    - "refactor"
  exclude:
    - title: "^Merge"
    - title: "^chore"
  trim_header: true

git:
  ignore:
    - packages/server/package-lock.json
  include:
    - package-lock.json
  push:
    options:
      - "--follow-tags"

commitAuthor:
  name: uplift-bot
  email: uplift-bot@users.noreply.github.com

annotatedTags: true
