name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install --ignore-scripts --force
      - name: Lint server
        run: cd packages/server && npx eslint --ext=jsx,js,tsx,ts src --max-warnings ${{ vars.SERVER_LINT_BASELINE || 999 }}
      - name: Lint UI
        run: cd packages/ui && npx eslint --ext=jsx,js,tsx,ts src --max-warnings ${{ vars.UI_LINT_BASELINE || 0 }}

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install --ignore-scripts --force
      - name: Typecheck server
        run: cd packages/server && npx tsc --noEmit
      - name: Typecheck UI
        run: cd packages/ui && npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install --ignore-scripts --force
      - name: Run tests
        run: cd packages/server && npx vitest run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: packages/server/coverage/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          trivyignores: .trivyignore
      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scanners: secret
          exit-code: 1
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  dep-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm audit
        run: npm audit --audit-level=high --omit=dev 2>&1 | tee /tmp/npm-audit.json
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-audit-report
          path: /tmp/npm-audit.json

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check version consistency
        run: |
          ROOT_VER=$(node -p "require('./package.json').version")
          SERVER_VER=$(node -p "require('./packages/server/package.json').version")

          echo "root package.json:   $ROOT_VER"
          echo "server package.json: $SERVER_VER"

          # Root and server versions must match
          if [[ "$ROOT_VER" != "$SERVER_VER" ]]; then
            echo "::error::Version mismatch: root=$ROOT_VER server=$SERVER_VER"
            exit 1
          fi

          # CHANGELOG must have an Unreleased section (Uplift append target)
          if ! grep -q "## Unreleased" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing '## Unreleased' header (required by Uplift)"
            exit 1
          fi

          echo "Version consistency: OK ($ROOT_VER)"

  ci-complete:
    name: CI Complete
    if: always()
    needs: [lint, typecheck, test, security-scan, dep-audit, version-check]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          results=(
            "lint:${{ needs.lint.result }}"
            "typecheck:${{ needs.typecheck.result }}"
            "test:${{ needs.test.result }}"
            "security-scan:${{ needs.security-scan.result }}"
            "dep-audit:${{ needs.dep-audit.result }}"
            "version-check:${{ needs.version-check.result }}"
          )
          failed=0
          for entry in "${results[@]}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            if [[ "$result" != "success" ]]; then
              echo "::error::Job '$name' failed with result: $result"
              failed=1
            fi
          done
          if [[ "$failed" -eq 1 ]]; then
            exit 1
          fi
          echo "All CI jobs passed"
